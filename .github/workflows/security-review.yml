name: Security Review

on:
  pull_request:
    branches: [main, develop]

jobs:
  security-review:
    name: Claude Security Review
    runs-on: ubuntu-latest
    if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Security Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-20250514"
          direct_prompt: |
            Review this PR for security issues in a Python FastAPI application.
            Focus on:
            - SQL injection (raw SQL with aiosqlite)
            - Authentication/authorization bypasses
            - Credential exposure (hardcoded secrets, logging passwords)
            - Path traversal
            - SSRF (HTTP requests to network devices)
            - Input validation (IP addresses, ports, device names)
            - Insecure cryptography

            For each issue found, comment directly on the relevant line.
            If the PR looks safe, leave a single approving comment.
