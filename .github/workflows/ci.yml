name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run scoped ruff check (blocking)
        run: |
          ruff check \
            tests/conftest.py \
            tests/integration \
            tests/e2e \
            tests/unit/test_config.py \
            tests/unit/test_models.py \
            tests/unit/test_parsers.py \
            connectors/ssh_connector \
            core/engine/device_manager.py \
            core/database/models.py \
            --output-format=github

      - name: Run scoped ruff format check (blocking)
        run: |
          ruff format --check \
            tests/conftest.py \
            tests/integration \
            tests/e2e \
            tests/unit/test_config.py \
            tests/unit/test_models.py \
            tests/unit/test_parsers.py \
            connectors/ssh_connector \
            core/engine/device_manager.py \
            core/database/models.py

      - name: Run full-repo ruff check (non-blocking)
        continue-on-error: true
        run: ruff check . --output-format=github

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest (no e2e) with JUnit and coverage
        env:
          CREDENTIALS_MASTER_KEY: ci-master-key
          AGENT_AUTH_TOKEN: ci-agent-token
          SECRET_KEY: ci-secret-key
          NETVAULT_ENV: testing
        run: |
          mkdir -p test-results
          pytest -m "not e2e" \
            --junitxml=test-results/junit.xml \
            --cov=core \
            --cov=connectors \
            --cov-report=term-missing \
            --cov-report=xml:test-results/coverage.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t netvault:ci .

      - name: Start container and run health check
        env:
          CREDENTIALS_MASTER_KEY: ci-master-key
          AGENT_AUTH_TOKEN: ci-agent-token
          SECRET_KEY: ci-secret-key
        run: |
          docker run -d --name netvault-ci -p 18080:8080 \
            -e CREDENTIALS_MASTER_KEY="$CREDENTIALS_MASTER_KEY" \
            -e AGENT_AUTH_TOKEN="$AGENT_AUTH_TOKEN" \
            -e SECRET_KEY="$SECRET_KEY" \
            netvault:ci
          for i in {1..20}; do
            if curl -fsS http://localhost:18080/health; then
              echo "Health check passed"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "Health check failed"
              docker logs netvault-ci
              exit 1
            fi
            sleep 3
          done
          docker stop netvault-ci
          docker rm netvault-ci
