services:
  netvault-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netvault-backend
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
      - "${API_PORT:-8443}:8443"
      - "8444:8444"
    volumes:
      - ./config:/app/config
      - netvault-data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - NETVAULT_ENV=production
      - TZ=${TZ:-UTC}
      - LOCAL_IP=${LOCAL_IP:-172.17.0.56}
    networks:
      - netvault-net

  netvault-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netvault-frontend
    restart: unless-stopped
    depends_on:
      - netvault-backend
    ports:
      - "80:80"
    networks:
      - netvault-net

volumes:
  netvault-data:
    driver: local

networks:
  netvault-net:
    driver: bridge
