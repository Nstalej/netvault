{% extends "base.html" %}

{% block title %}Device Detail | NetVault{% endblock %}
{% block page_title %}Device Detail{% endblock %}

{% block content %}
<style>
    .detail-shell { display: flex; flex-direction: column; gap: 1rem; }
    .header-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
    .header-title { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; margin-top: 0.55rem; }
    .header-meta { display: flex; gap: 0.45rem; flex-wrap: wrap; color: var(--text-muted); font-size: 0.88rem; margin-top: 0.35rem; }
    .header-actions { display: flex; gap: 0.55rem; flex-wrap: wrap; }

    .status-badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 0.16rem 0.58rem; font-size: 0.75rem; border: 1px solid transparent; }
    .badge-online, .badge-up { color: var(--success); background: rgba(34, 197, 94, 0.12); border-color: rgba(34, 197, 94, 0.35); }
    .badge-offline, .badge-down { color: var(--danger); background: rgba(239, 68, 68, 0.12); border-color: rgba(239, 68, 68, 0.35); }
    .badge-warning { color: var(--warning); background: rgba(245, 158, 11, 0.12); border-color: rgba(245, 158, 11, 0.35); }
    .badge-unknown { color: var(--text-muted); background: rgba(255, 255, 255, 0.05); border-color: var(--border); }

    .tabs-wrap { display: flex; gap: 0.25rem; border-bottom: 1px solid var(--border); overflow-x: auto; }
    .tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 0.8rem 0.95rem; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--text-primary); border-bottom-color: var(--accent); }

    .tab-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .tab-content { padding: 1rem; }

    .cards-grid { display: grid; gap: 0.75rem; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .info-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem; }
    .info-label { color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; font-size: 0.76rem; margin-bottom: 0.2rem; }
    .info-value { color: var(--text-primary); font-size: 0.93rem; word-break: break-word; }

    .table-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: auto; max-height: 62vh; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { text-align: left; padding: 0.62rem 0.7rem; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 0.86rem; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table th { position: sticky; top: 0; z-index: 2; background: var(--bg-secondary); }

    .spinner-wrap { display: flex; align-items: center; gap: 0.65rem; color: var(--text-muted); }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255, 255, 255, 0.18); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }

    .error-msg { color: var(--danger); }
    .inline-msg { margin-top: 0.75rem; font-size: 0.85rem; }
    .inline-msg.success { color: var(--success); }
    .inline-msg.error { color: var(--danger); }
    .inline-msg.warning { color: var(--warning); }

    .btn { padding: 0.44rem 0.78rem; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-primary); }
    .btn-action { border-color: var(--accent); color: var(--accent); }
    .btn-danger { border-color: rgba(239, 68, 68, 0.45); color: var(--danger); }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 760px) {
        .tabs-wrap { flex-wrap: wrap; overflow: visible; }
    }
</style>

<div class="detail-shell">
    <div class="header-card">
        <div class="header-top">
            <div>
                <a href="/devices" class="btn btn-action"><i class="fas fa-arrow-left"></i> Back to Devices</a>
                <div class="header-title">
                    <h3 id="device-name" style="margin: 0;">Device #{{ device_id }}</h3>
                    <span id="device-status-badge" class="status-badge badge-unknown">UNKNOWN</span>
                </div>
                <div class="header-meta">
                    <span>IP: <code id="device-ip">-</code></span>
                    <span>&bull;</span>
                    <span>Type: <strong id="device-type">-</strong></span>
                    <span>&bull;</span>
                    <span id="device-connector">-</span>
                    <span>&bull;</span>
                    <span>Last: <strong id="device-last-seen">-</strong></span>
                </div>
            </div>
            <div class="header-actions">
                <button id="btn-test" class="btn btn-action" onclick="runTest()"><i class="fas fa-network-wired"></i> Test</button>
                <button id="btn-refresh" class="btn btn-action" onclick="runRefresh()"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="btn btn-danger" onclick="deleteDevice()"><i class="fas fa-trash"></i> Delete</button>
            </div>
        </div>
        <div id="action-message" class="inline-msg"></div>
    </div>

    <div class="tab-card">
        <div id="tabs" class="tabs-wrap"></div>
        <div id="tab-content" class="tab-content"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const TEMPLATE_DEVICE_ID = Number("{{ device_id }}");
    const URL_DEVICE_ID = Number((window.location.pathname.match(/\/devices\/(\d+)/) || [])[1]);
    const DEVICE_ID = Number.isFinite(TEMPLATE_DEVICE_ID) && TEMPLATE_DEVICE_ID > 0 ? TEMPLATE_DEVICE_ID : URL_DEVICE_ID;

    const state = {
        device: null,
        activeTab: "overview",
        tabs: [],
        cache: {},
    };

    const esc = (text) => {
        const div = document.createElement("div");
        div.textContent = String(text ?? "");
        return div.innerHTML;
    };

    const fmtDate = (value) => {
        if (!value) return "Never";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString();
    };

    const fmtBytes = (n) => {
        const num = Number(n);
        if (!Number.isFinite(num)) return "-";
        if (num < 1024) return `${num} B`;
        if (num < 1024 ** 2) return `${(num / 1024).toFixed(2)} KB`;
        if (num < 1024 ** 3) return `${(num / (1024 ** 2)).toFixed(2)} MB`;
        return `${(num / (1024 ** 3)).toFixed(2)} GB`;
    };

    const fmtLatency = (ms) => {
        const num = Number(ms);
        if (!Number.isFinite(num)) return "-";
        return `${num.toFixed(2)} ms`;
    };

    const statusBadge = (status) => {
        const s = String(status || "unknown").toLowerCase();
        let cls = "badge-unknown";
        if (s === "online" || s === "up") cls = "badge-online";
        else if (s === "offline" || s === "down") cls = "badge-offline";
        else if (s === "warning") cls = "badge-warning";
        return `<span class="status-badge ${cls}">${esc(s.toUpperCase())}</span>`;
    };

    const setActionMessage = (message = "", kind = "") => {
        const el = document.getElementById("action-message");
        el.className = "inline-msg";
        if (kind) el.classList.add(kind);
        el.textContent = message;
    };

    const api = async (path, options = {}) => {
        try {
            const response = await fetch(path, {
                headers: { "Content-Type": "application/json", ...(options.headers || {}) },
                ...options,
            });
            const contentType = response.headers.get("content-type") || "";
            const data = contentType.includes("application/json") ? await response.json() : await response.text();
            return { ok: response.ok, status: response.status, data };
        } catch (error) {
            return { ok: false, status: 0, data: { detail: String(error) } };
        }
    };

    const parseDetail = (payload) => {
        if (!payload) return "Request failed";
        if (typeof payload === "string") return payload;
        return payload.detail || payload.error || JSON.stringify(payload);
    };

    const normalizeType = (typeValue) => {
        const t = String(typeValue || "").trim().toLowerCase();
        if (t === "ap") return "ap";
        if (t.includes("mikrotik")) return "mikrotik";
        if (t === "switch") return "switch";
        return t || "unknown";
    };

    const tabsForType = (typeValue) => {
        const t = normalizeType(typeValue);
        if (t === "mikrotik") return ["overview", "interfaces", "arp", "mac", "routes", "system"];
        if (t === "ap") return ["overview", "interfaces", "system"];
        if (t === "switch") return ["overview", "interfaces", "arp", "mac", "system"];
        return ["overview", "system"];
    };

    const tabLabel = (key) => ({
        overview: "Overview",
        interfaces: "Interfaces",
        arp: "ARP Table",
        mac: "MAC Table",
        routes: "Routes",
        system: "System",
    }[key] || key);

    const renderCards = (items) => `
        <div class="cards-grid">
            ${items.map((item) => `
                <div class="info-card">
                    <div class="info-label">${esc(item.label)}</div>
                    <div class="info-value">${item.value == null || item.value === "" ? "-" : item.value}</div>
                </div>
            `).join("")}
        </div>
    `;

    const renderTable = (columns, rows) => `
        <div class="table-wrap">
            <table class="data-table">
                <thead><tr>${columns.map((c) => `<th>${esc(c)}</th>`).join("")}</tr></thead>
                <tbody>
                    ${rows.length
                        ? rows.map((row) => `<tr>${row.map((cell) => `<td>${cell == null ? "-" : cell}</td>`).join("")}</tr>`).join("")
                        : `<tr><td colspan="${columns.length}" style="text-align:center; color:var(--text-muted);">No data available</td></tr>`}
                </tbody>
            </table>
        </div>
    `;

    const renderHeader = () => {
        const d = state.device || {};
        document.getElementById("device-name").textContent = d.name || `Device #${DEVICE_ID}`;
        document.getElementById("device-ip").textContent = d.ip || d.ip_address || "-";
        document.getElementById("device-type").textContent = d.type || "-";
        document.getElementById("device-connector").textContent = d.connector_type ? d.connector_type.toUpperCase() : "-";
        document.getElementById("device-last-seen").textContent = fmtDate(d.last_seen);
        document.getElementById("device-status-badge").outerHTML = statusBadge(d.status || "unknown").replace("<span", '<span id="device-status-badge"');
    };

    const renderTabs = () => {
        const tabsEl = document.getElementById("tabs");
        tabsEl.innerHTML = state.tabs.map((tab) => `
            <button class="tab-btn ${state.activeTab === tab ? "active" : ""}" onclick="activateTab('${tab}')">${tabLabel(tab)}</button>
        `).join("");
    };

    const setTabContent = (html) => {
        document.getElementById("tab-content").innerHTML = html;
    };

    const loadingMarkup = (msg) => `<div class="spinner-wrap"><span class="spinner"></span><span>${esc(msg)}</span></div>`;

    const renderOverview = () => {
        const d = state.device || {};
        const latency = d.config_json && d.config_json.last_latency_ms != null ? fmtLatency(d.config_json.last_latency_ms) : "-";
        return renderCards([
            { label: "Name", value: esc(d.name || "-") },
            { label: "IP", value: `<code>${esc(d.ip || d.ip_address || "-")}</code>` },
            { label: "Type", value: esc(d.type || "-") },
            { label: "Connector", value: esc(d.connector_type || "-") },
            { label: "Port", value: esc(d.port || "-") },
            { label: "Status", value: statusBadge(d.status || "unknown") },
            { label: "Last Seen", value: esc(fmtDate(d.last_seen)) },
            { label: "Latency", value: esc(latency) },
            { label: "Created", value: esc(fmtDate(d.created_at)) },
        ]);
    };

    const fetchTabPayload = async (tab, force = false) => {
        if (!force && state.cache[tab]) return state.cache[tab];
        let res = { ok: true, status: 200, data: {} };
        if (tab === "overview") res = { ok: true, status: 200, data: state.device };
        else if (tab === "system") res = await api(`/api/devices/${DEVICE_ID}/system`);
        else if (tab === "interfaces") res = await api(`/api/devices/${DEVICE_ID}/interfaces`);
        else if (tab === "arp") res = await api(`/api/devices/${DEVICE_ID}/arp`);
        else if (tab === "mac") res = await api(`/api/devices/${DEVICE_ID}/mac-table`);
        else if (tab === "routes") res = await api(`/api/devices/${DEVICE_ID}/routes`);
        state.cache[tab] = res;
        return res;
    };

    const renderSystem = (payload) => {
        if (payload && payload.error) {
            return `<p class="error-msg">System info not available for this device type.</p>`;
        }
        const memory = `${payload.memory_free || "-"} / ${payload.memory_total || "-"}`;
        return renderCards([
            { label: "Model", value: esc(payload.model || "-") },
            { label: "OS Version", value: esc(payload.os_version || "-") },
            { label: "Uptime", value: esc(payload.uptime || "-") },
            { label: "CPU", value: esc(payload.cpu || "-") },
            { label: "RAM", value: esc(memory) },
        ]);
    };

    const renderInterfaces = (rows) => {
        if (!Array.isArray(rows) || rows.length === 0) {
            return `<p style="color: var(--text-muted);">No interface data available</p>`;
        }
        const tableRows = rows.map((item) => [
            esc(item.name || "-"),
            statusBadge(item.status || "unknown"),
            esc(item.speed ?? "-"),
            `<code>${esc(item.mac || "-")}</code>`,
            esc(item.ip || "-"),
            esc(fmtBytes(item.tx_bytes)),
            esc(fmtBytes(item.rx_bytes)),
            esc(item.errors ?? 0),
        ]);
        return renderTable(["Name", "Status", "Speed", "MAC", "IP", "TX Bytes", "RX Bytes", "Errors"], tableRows);
    };

    const renderArp = (rows) => renderTable(
        ["IP", "MAC", "Interface"],
        (rows || []).map((item) => [esc(item.ip || "-"), `<code>${esc(item.mac || "-")}</code>`, esc(item.interface || "-")]),
    );

    const renderMac = (rows) => renderTable(
        ["MAC Address", "Interface", "VLAN", "Type"],
        (rows || []).map((item) => [
            `<code>${esc(item.mac || "-")}</code>`,
            esc(item.interface || "-"),
            esc(item.vlan ?? "-"),
            esc(item.type || "-"),
        ]),
    );

    const renderRoutes = (rows) => renderTable(
        ["Destination", "Gateway", "Interface", "Distance"],
        (rows || []).map((item) => [
            esc(item.destination || "-"),
            esc(item.gateway || "-"),
            esc(item.interface || "-"),
            esc(item.distance ?? "-"),
        ]),
    );

    const render404LoadData = (tab) => {
        const labels = {
            arp: "Load ARP Data",
            mac: "Load MAC Table",
            routes: "Load Routes",
        };
        return `
            <p class="error-msg">${esc(parseDetail(state.cache[tab].data))}</p>
            <button class="btn btn-action" onclick="loadDataForTab('${tab}')">${labels[tab] || "Load Data"}</button>
        `;
    };

    const renderActiveTab = async (force = false) => {
        const tab = state.activeTab;
        setTabContent(loadingMarkup(`Loading ${tabLabel(tab)}...`));
        const res = await fetchTabPayload(tab, force);

        if (!res.ok) {
            if (res.status === 404 && ["arp", "mac", "routes"].includes(tab)) {
                setTabContent(render404LoadData(tab));
                return;
            }
            setTabContent(`<p class="error-msg">${esc(parseDetail(res.data))}</p>`);
            return;
        }

        if (tab === "overview") setTabContent(renderOverview());
        else if (tab === "system") setTabContent(renderSystem(res.data || {}));
        else if (tab === "interfaces") setTabContent(renderInterfaces(res.data || []));
        else if (tab === "arp") setTabContent(renderArp(res.data || []));
        else if (tab === "mac") setTabContent(renderMac(res.data || []));
        else if (tab === "routes") setTabContent(renderRoutes(res.data || []));
        else setTabContent(`<p class="error-msg">Tab not implemented</p>`);
    };

    const activateTab = async (tab) => {
        state.activeTab = tab;
        renderTabs();
        if (state.cache[tab] && state.cache[tab].ok) {
            if (tab === "overview") setTabContent(renderOverview());
            else if (tab === "system") setTabContent(renderSystem(state.cache[tab].data || {}));
            else if (tab === "interfaces") setTabContent(renderInterfaces(state.cache[tab].data || []));
            else if (tab === "arp") setTabContent(renderArp(state.cache[tab].data || []));
            else if (tab === "mac") setTabContent(renderMac(state.cache[tab].data || []));
            else if (tab === "routes") setTabContent(renderRoutes(state.cache[tab].data || []));
            return;
        }
        await renderActiveTab(false);
    };

    const setButtonLoading = (btnId, loading, labelHtml) => {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        if (loading) {
            btn.disabled = true;
            btn.dataset.prev = btn.innerHTML;
            btn.innerHTML = `<span class="spinner" style="width:14px;height:14px;"></span> ${labelHtml}`;
        } else {
            btn.disabled = false;
            btn.innerHTML = btn.dataset.prev || labelHtml;
        }
    };

    const runTest = async () => {
        setActionMessage("Testing connectivity...", "warning");
        setButtonLoading("btn-test", true, "Testing");
        const res = await api(`/api/devices/${DEVICE_ID}/test`, { method: "POST" });
        setButtonLoading("btn-test", false, '<i class="fas fa-network-wired"></i> Test');

        if (!res.ok) {
            setActionMessage(`Test failed: ${parseDetail(res.data)}`, "error");
            return;
        }

        const data = res.data || {};
        if (state.device) {
            state.device.status = data.status || state.device.status;
            state.device.config_json = state.device.config_json || {};
            if (data.latency_ms != null) state.device.config_json.last_latency_ms = data.latency_ms;
            renderHeader();
            state.cache.overview = { ok: true, status: 200, data: state.device };
            if (state.activeTab === "overview") setTabContent(renderOverview());
        }

        if (data.success) {
            setActionMessage(`Online - ${fmtLatency(data.latency_ms)}`, "success");
        } else {
            setActionMessage(`Offline - ${data.error || "Unknown error"}`, "error");
        }
    };

    const runRefresh = async () => {
        setActionMessage("Refreshing data...", "warning");
        setButtonLoading("btn-refresh", true, "Refreshing");
        const res = await api(`/api/devices/${DEVICE_ID}/refresh`, { method: "POST" });
        if (!res.ok) {
            setButtonLoading("btn-refresh", false, '<i class="fas fa-sync-alt"></i> Refresh');
            setActionMessage(`Refresh failed: ${parseDetail(res.data)}`, "error");
            return;
        }

        state.cache = {};
        await new Promise((resolve) => setTimeout(resolve, 3000));

        const deviceRes = await api(`/api/devices/${DEVICE_ID}`);
        if (deviceRes.ok) {
            state.device = deviceRes.data;
            state.cache.overview = { ok: true, status: 200, data: state.device };
            renderHeader();
        }

        await renderActiveTab(true);
        setButtonLoading("btn-refresh", false, '<i class="fas fa-sync-alt"></i> Refresh');
        setActionMessage("Refresh complete", "success");
    };

    const loadDataForTab = async (tab) => {
        await runRefresh();
        state.activeTab = tab;
        renderTabs();
        await renderActiveTab(true);
    };

    const deleteDevice = async () => {
        if (!confirm("Are you sure you want to delete this device?")) return;
        const res = await api(`/api/devices/${DEVICE_ID}`, { method: "DELETE" });
        if (!res.ok) {
            setActionMessage(`Delete failed: ${parseDetail(res.data)}`, "error");
            return;
        }
        window.location.href = "/devices";
    };

    const bootstrap = async () => {
        if (!Number.isFinite(DEVICE_ID) || DEVICE_ID <= 0) {
            setTabContent('<p class="error-msg">Device not found. <a href="/devices">Back to devices</a></p>');
            return;
        }

        const res = await api(`/api/devices/${DEVICE_ID}`);
        if (!res.ok || !res.data || !res.data.id) {
            setTabContent('<p class="error-msg">Device not found. <a href="/devices">Back to devices</a></p>');
            return;
        }

        state.device = res.data;
        state.tabs = tabsForType(state.device.type);
        state.activeTab = "overview";
        state.cache = { overview: { ok: true, status: 200, data: state.device } };

        renderHeader();
        renderTabs();
        await renderActiveTab(false);
    };

    const refreshPageData = async () => {
        await bootstrap();
    };
</script>
{% endblock %}
